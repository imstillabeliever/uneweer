<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/png" href="icon.png">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⠀</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

  .preview-box{
  margin-top:35px;
}

.preview-box h2{
  margin-bottom:20px;
  letter-spacing:4px;
  font-size:18px;
  color:#ff2a2a;
}

.track{
  position:relative;

  margin-bottom:18px;
  padding:18px;

  background:rgba(10,10,10,0.72);

  border:1px solid rgba(255,0,0,0.18);

  border-radius:18px;

  backdrop-filter:blur(14px);

  box-shadow:
  0 0 25px rgba(255,0,0,0.08),
  inset 0 0 15px rgba(255,255,255,0.02);

  transition:0.3s;
}

.track:hover{
  transform:translateY(-2px);

  border:1px solid rgba(255,0,0,0.35);

  box-shadow:
  0 0 35px rgba(255,0,0,0.15);
}

.track p{
  margin-bottom:12px;

  color:white;

  font-size:12px;

  letter-spacing:2px;

  opacity:0.9;
}

audio::-webkit-media-controls-volume-slider{
  display:none;
}

audio::-webkit-media-controls-mute-button{
  display:none;
}

audio::-webkit-media-controls-download-button{
  display:none;
}

  filter:
  invert(1)
  contrast(0.9)
  brightness(0.85);
}

body{
  background: #000;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ОБЩИЙ ФОН (БЕЗ СБОЕВ) */
.bg{
  position:fixed;
  inset:0;
  background:url("bg.jpg") center/cover no-repeat;
  z-index:-2;
}

/* затемнение */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;

  pointer-events:none;
}

/* КАРТОЧКА */
.card{
  width:420px;
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,0,0,0.3);
  background:#0a0a0a;
}

/* ОБЛОЖКА ВНУТРИ КАРТОЧКИ */
.card-top{
  height:220px;
  background:#111;
  background-image:url("card.jpg");
  background-size:cover;
  background-position:center;
}

/* если картинка не загрузилась */
.card-top::after{
  content:"";
  display:block;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, transparent, rgba(0,0,0,0.6));
}

/* КОНТЕНТ */
.content{
  padding:20px;
}

h1{
  font-size:26px;
  letter-spacing:2px;
  margin-bottom:10px;
}

p{
  font-size:14px;
  opacity:0.8;
  margin-bottom:15px;
}

/* ЦЕНА */
.price-old{
  text-decoration:line-through;
  color:gray;
}

.price-new{
  color:red;
  font-size:22px;
  margin-left:10px;
  font-weight:bold;
}

/* КНОПКА */
.btn{
  display:block;
  margin-top:20px;
  padding:15px;
  background:red;
  color:white;
  text-align:center;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}

.btn:hover{
  opacity:0.85;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="card">

  <div class="card-top"></div>

  <div class="content">

    <h1>BLOOD READY DRUM KIT</h1>

    <p>
      Heavy 808s, distorted drums, aggressive sound design.
    </p>

    <div>
      <span class="price-old">$50</span>
      <span class="price-new">$29</span>
    </div>

    <a class="btn" href="payment.html">
      BUY NOW WITH CRYPTO
    </a>

  <div class="preview-box">

  <!-- PREVIEW 1 -->
  <div class="track">
    <p>blood1.mp3</p>

    <audio controls>
      <source src="blood1.mp3" type="audio/mpeg">
    </audio>
  </div>

  <!-- PREVIEW 2 -->
  <div class="track">
    <p>blood2.mp3</p>

    <audio controls>
      <source src="blood2.mp3" type="audio/mpeg">
    </audio>
  </div>

  <!-- PREVIEW 3 -->
  <div class="track">
    <p>blood3.mp3</p>

    <audio controls>
      <source src="blood3.mp3" type="audio/mpeg">
    </audio>
  </div>

</div>
  
</body>
</html>
