<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⠀</title>

<link rel="icon" type="image/png" href="icon.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY */

body{
  font-family:'Cinzel', serif;

  background:#000;

  color:white;

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:flex-start;

  padding:50px 20px;

  overflow-x:hidden;

  position:relative;
}

/* BACKGROUND */

.bg{
  position:fixed;

  inset:0;

  background:url("bg.jpg") center/cover no-repeat;

  z-index:-2;
}

/* DARK OVERLAY */

.overlay{
  position:fixed;

  inset:0;

  background:rgba(0,0,0,0.72);

  z-index:-1;

  pointer-events:none;
}

/* CARD */

.card{
  width:100%;

  max-width:420px;

  border-radius:24px;

  overflow:hidden;

  background:rgba(8,8,8,0.92);

  border:1px solid rgba(255,0,0,0.18);

  box-shadow:
  0 0 40px rgba(255,0,0,0.12);

  backdrop-filter:blur(12px);

  margin-bottom:40px;
}

/* IMAGE */

.card-top{
  height:260px;

  background:url("card.jpg") center/cover no-repeat;

  position:relative;
}

.card-top::after{
  content:"";

  position:absolute;

  inset:0;

  background:
  linear-gradient(
  to bottom,
  rgba(0,0,0,0.05),
  rgba(0,0,0,0.7)
  );
}

/* CONTENT */

.content{
  padding:24px;
}

h1{
  font-size:30px;

  letter-spacing:4px;

  margin-bottom:12px;
}

.desc{
  font-size:13px;

  opacity:0.72;

  line-height:1.7;

  margin-bottom:24px;
}

/* PRICE */

.price{
  margin-bottom:30px;
}

.price-old{
  text-decoration:line-through;

  color:gray;

  font-size:16px;
}

.price-new{
  color:#ff1a1a;

  font-size:28px;

  margin-left:10px;

  font-weight:900;
}

/* BUTTON */

.btn{
  display:block;

  width:100%;

  text-align:center;

  padding:16px;

  border-radius:14px;

  background:#ff0000;

  color:white;

  text-decoration:none;

  font-size:14px;

  letter-spacing:2px;

  font-weight:bold;

  transition:0.3s;

  box-shadow:
  0 0 25px rgba(255,0,0,0.35);
}

.btn:hover{
  transform:translateY(-2px);

  opacity:0.9;
}

/* PREVIEWS */

.preview-box{
  margin-top:35px;
}

.preview-box h2{
  margin-bottom:20px;

  letter-spacing:4px;

  font-size:16px;

  color:#ff2a2a;
}

/* TRACK */

.track{
  margin-bottom:18px;

  padding:16px;

  border-radius:18px;

  background:rgba(255,255,255,0.03);

  border:1px solid rgba(255,0,0,0.14);

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 20px rgba(255,0,0,0.05);
}

.track p{
  margin-bottom:10px;

  font-size:11px;

  letter-spacing:2px;

  opacity:0.92;
}

/* AUDIO */

audio{
  width:100%;

  height:38px;

  opacity:0.88;

  filter:
  invert(1)
  contrast(0.9)
  brightness(0.82);
}

/* FOOTER */

.footer{
  margin-top:35px;

  text-align:center;

  font-size:11px;

  opacity:0.4;

  letter-spacing:2px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="overlay"></div>

<div class="card">

  <div class="card-top"></div>

  <div class="content">

    <h1>BLOOD READY DRUM KIT</h1>

    <p class="desc">
      Heavy 808s, distorted drums.
    </p>

    <div class="price">
      <span class="price-old">$50</span>
      <span class="price-new">$29</span>
    </div>

    <a class="btn" href="payment.html">
      BUY NOW WITH CRYPTO
    </a>

    <!-- PREVIEWS -->

    <div class="preview-box">

      <h2>BEAT PREVIEWS</h2>

      <!-- 1 -->

      <div class="track">

        <p>BLOOD READY BEAT PREVIEW 1.mp3</p>

        <audio controls controlsList="nodownload noplaybackrate">
          <source src="blood1.mp3" type="audio/mpeg">
        </audio>

      </div>

      <!-- 2 -->

      <div class="track">

        <p>BLOOD READY BEAT PREVIEW 2.mp3</p>

        <audio controls controlsList="nodownload noplaybackrate">
          <source src="blood2.mp3" type="audio/mpeg">
        </audio>

      </div>

      <!-- 3 -->

      <div class="track">

        <p>BLOOD READY BEAT PREVIEW 3.mp3</p>

        <audio controls controlsList="nodownload noplaybackrate">
          <source src="blood3.mp3" type="audio/mpeg">
        </audio>

      </div>

    </div>

    <div class="footer">
      © 2026 UNEWEER — ALL RIGHTS RESERVED
    </div>

  </div>

</div>

</body>
</html>
