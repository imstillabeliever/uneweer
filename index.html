<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uneweer — BLOOD READY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: white;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,0,0,0.2), transparent 40%),
        radial-gradient(circle at bottom, rgba(255,0,0,0.12), transparent 40%),
        #000;
      z-index: -2;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url('https://grainy-gradients.vercel.app/noise.svg');
      z-index: -1;
      pointer-events: none;
    }

    header {
      width: 100%;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(255,0,0,0.15);
      z-index: 999;
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 0 12px rgba(255,0,0,0.8);
    }

    .socials a {
      text-decoration: none;
      color: #fff;
      font-size: 14px;
      transition: 0.3s;
    }

    .socials a:hover {
      color: red;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 20px 60px;
    }

    .hero h1 {
      font-size: clamp(60px, 12vw, 160px);
      font-weight: 800;
      letter-spacing: 10px;
      line-height: 0.9;
      color: white;
      text-shadow:
        0 0 10px rgba(255,0,0,0.8),
        0 0 30px rgba(255,0,0,0.4);
      animation: pulse 3s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        text-shadow:
          0 0 10px rgba(255,0,0,0.8),
          0 0 30px rgba(255,0,0,0.4);
      }
      50% {
        text-shadow:
          0 0 20px rgba(255,0,0,1),
          0 0 60px rgba(255,0,0,0.8);
      }
    }

    .subtitle {
      margin-top: 24px;
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      letter-spacing: 3px;
    }

    .product-section {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 40px 20px 120px;
    }

    .product-card {
      width: 100%;
      max-width: 500px;
      border: 1px solid rgba(255,0,0,0.2);
      background: rgba(10,10,10,0.8);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(255,0,0,0.08);
      transition: 0.4s;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 60px rgba(255,0,0,0.2);
    }

    .cover {
      width: 100%;
      height: 340px;
      background:
        linear-gradient(to bottom, rgba(255,0,0,0.15), rgba(0,0,0,1)),
        #050505;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 6px;
      text-shadow: 0 0 20px red;
    }

    .product-info {
      padding: 32px;
    }

    .product-title {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .product-description {
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .buy-btn {
      width: 100%;
      border: none;
      background: linear-gradient(90deg, #5c0000, #ff0000);
      color: white;
      padding: 18px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .buy-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(255,0,0,0.4);
    }

    .wallet {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      word-break: break-all;
      text-align: center;
    }

    footer {
      padding: 40px 20px;
      text-align: center;
      color: rgba(255,255,255,0.4);
      border-top: 1px solid rgba(255,0,0,0.1);
    }

    audio {
      display: none;
    }

    @media (max-width: 768px) {
      header {
        padding: 20px;
      }

      .hero h1 {
        letter-spacing: 4px;
      }

      .cover {
        height: 260px;
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="noise"></div>

  <header>
    <div class="logo">uneweer</div>

    <div class="socials">
      <a href="https://www.instagram.com/uneweer/" target="_blank">INSTAGRAM</a>
    </div>
  </header>

  <section class="hero">
    <h1>uneweer</h1>
    <div class="subtitle">BLOOD READY DRUM KIT</div>
  </section>

  <section class="product-section">
    <div class="product-card">

      <div class="cover">
        BLOOD
      </div>

      <div class="product-info">
        <div class="product-title">BLOOD READY</div>

        <div class="product-description">
          Underground blood-style drum kit.
          Dark textures, heavy 808s, distorted drums,
          aggressive melodies and experimental sound design.
        </div>

        <a class="buy-btn" href="payment.html">
          BUY NOW WITH CRYPTO
        </a>

        <div class="wallet" id="wallet">
          YOUR WALLET ADDRESS HERE
        </div>
      </div>
    </div>
  </section>

  <footer>
    © 2026 uneweer — ALL RIGHTS RESERVED
  </footer>

  <audio autoplay loop>
    <source src="your-music.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
